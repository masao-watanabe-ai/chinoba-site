<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img"
     aria-label="The value chain of intelligence field economics: knowledge descends into trust, trust into coordination, coordination into decision, and decision into economic value.">
  <defs>
    <linearGradient id="rl-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7db7ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7db7ff" stop-opacity="0"/>
    </linearGradient>
    <marker id="rl-arrow" markerWidth="12" markerHeight="12" refX="4" refY="8" orient="auto">
      <path d="M1,1 L4,8 L7,1" fill="none" stroke="#7db7ff" stroke-width="1.2"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#0b0b0b"/>
  <rect width="1200" height="720" fill="url(#rl-glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" fill="none" stroke="#1f1f1f"/>

  <text x="600" y="80" text-anchor="middle" fill="#6a6a6a" font-family="Courier New, monospace" font-size="18" letter-spacing="4">THE VALUE CHAIN</text>

  <g font-family="Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- five stacked nodes -->
    <g>
      <rect x="400" y="110" width="400" height="72" rx="6" fill="#111111" stroke="#2a2a2a"/>
      <text x="600" y="154" fill="#f5f5f5" font-size="20">Knowledge</text>

      <rect x="400" y="230" width="400" height="72" rx="6" fill="#111111" stroke="#2a2a2a"/>
      <text x="600" y="274" fill="#f5f5f5" font-size="20">Trust</text>

      <rect x="400" y="350" width="400" height="72" rx="6" fill="#111111" stroke="#2a2a2a"/>
      <text x="600" y="394" fill="#f5f5f5" font-size="20">Coordination</text>

      <rect x="400" y="470" width="400" height="72" rx="6" fill="#111111" stroke="#2a2a2a"/>
      <text x="600" y="514" fill="#f5f5f5" font-size="20">Decision</text>

      <rect x="400" y="590" width="400" height="72" rx="6" fill="#111111" stroke="#7db7ff" stroke-opacity="0.55"/>
      <text x="600" y="634" fill="#7db7ff" font-size="20">Economic Value</text>
    </g>

    <g stroke="#7db7ff" stroke-opacity="0.7" stroke-width="1.4">
      <line x1="600" y1="182" x2="600" y2="226" marker-end="url(#rl-arrow)"/>
      <line x1="600" y1="302" x2="600" y2="346" marker-end="url(#rl-arrow)"/>
      <line x1="600" y1="422" x2="600" y2="466" marker-end="url(#rl-arrow)"/>
      <line x1="600" y1="542" x2="600" y2="586" marker-end="url(#rl-arrow)"/>
    </g>

    <g fill="#6a6a6a" font-family="Courier New, monospace" font-size="13" text-anchor="start">
      <text x="830" y="150">what is known</text>
      <text x="830" y="270">what can be relied on</text>
      <text x="830" y="390">what can be aligned</text>
      <text x="830" y="510">what is committed to</text>
      <text x="830" y="630">what is realized</text>
    </g>
  </g>
</svg>
